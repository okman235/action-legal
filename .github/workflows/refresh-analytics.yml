name: Refresh analytics data

# PostHog 실데이터를 받아 analytics/data/<app>.json 을 갱신하고 커밋합니다.
# - 수동 실행(Run workflow) 또는 매일 자동 실행
# - 필요 시크릿: POSTHOG_PERSONAL_API_KEY  (Settings → Secrets and variables → Actions)
# - 선택 변수: POSTHOG_PROJECT_ID (기본 509883), APP_ID (기본 ssamcam), DAYS (기본 90)

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: '앱 id (data/<id>.json)'
        required: false
        default: 'ssamcam'
      days:
        description: '조회 기간(일)'
        required: false
        default: '90'
  schedule:
    - cron: '17 18 * * *'   # 매일 03:17 KST (18:17 UTC)

permissions:
  contents: write

concurrency:
  group: refresh-analytics
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch PostHog data
        env:
          POSTHOG_PERSONAL_API_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
          POSTHOG_PROJECT_ID: ${{ vars.POSTHOG_PROJECT_ID || '509883' }}
          POSTHOG_HOST: ${{ vars.POSTHOG_HOST || 'https://us.posthog.com' }}
          DAYS: ${{ github.event.inputs.days || '90' }}
        run: |
          if [ -z "$POSTHOG_PERSONAL_API_KEY" ]; then
            echo "::error::POSTHOG_PERSONAL_API_KEY 시크릿이 없습니다. Settings → Secrets and variables → Actions 에서 추가하세요."
            exit 1
          fi
          node scripts/fetch-posthog.mjs "${{ github.event.inputs.app_id || 'ssamcam' }}"

      - name: Commit updated data
        run: |
          git config user.name  "analytics-bot"
          git config user.email "actions@users.noreply.github.com"
          if git diff --quiet -- analytics/data; then
            echo "변경 없음 — 커밋 생략"
            exit 0
          fi
          git add analytics/data
          git commit -m "chore(analytics): PostHog 데이터 갱신 [skip ci]"
          git push
