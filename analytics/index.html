<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>앱 애널리틱스 허브</title>
<style>
  :root {
    color-scheme: light;
    --plane: #f9f9f7;
    --surface: #fcfcfb;
    --surface-2: #f3f2ee;
    --ink: #0b0b0b;
    --ink-2: #52514e;
    --muted: #898781;
    --grid: #e1e0d9;
    --axis: #c3c2b7;
    --border: rgba(11,11,11,0.10);
    --good: #0ca30c;
    --warn: #fab219;
    --accent: #1baf7a;         /* 선택 앱에 따라 JS가 교체 */
    --accent-weak: color-mix(in srgb, var(--accent) 16%, transparent);
    --shadow: 0 1px 2px rgba(11,11,11,.04), 0 6px 20px rgba(11,11,11,.05);
    --radius: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root:where(:not([data-theme="light"])) {
      color-scheme: dark;
      --plane: #0d0d0d; --surface: #1a1a19; --surface-2: #222220;
      --ink: #ffffff; --ink-2: #c3c2b7; --muted: #898781;
      --grid: #2c2c2a; --axis: #383835; --border: rgba(255,255,255,0.10);
      --good: #0ca30c;
      --accent: #199e70;
      --shadow: 0 1px 2px rgba(0,0,0,.4), 0 10px 28px rgba(0,0,0,.35);
    }
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --plane: #0d0d0d; --surface: #1a1a19; --surface-2: #222220;
    --ink: #ffffff; --ink-2: #c3c2b7; --muted: #898781;
    --grid: #2c2c2a; --axis: #383835; --border: rgba(255,255,255,0.10);
    --accent: #199e70;
    --shadow: 0 1px 2px rgba(0,0,0,.4), 0 10px 28px rgba(0,0,0,.35);
  }

  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--plane); color: var(--ink);
    font-family: system-ui, -apple-system, "Segoe UI", "Apple SD Gothic Neo", sans-serif;
    line-height: 1.55; -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1120px; margin: 0 auto; padding: 28px 22px 80px; }
  a { color: var(--accent); }

  header.top { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 16px 24px; margin-bottom: 8px; }
  .title { font-size: 22px; font-weight: 750; letter-spacing: -0.02em; }
  .title .dot { color: var(--accent); }
  .subtitle { color: var(--muted); font-size: 13.5px; margin-top: 2px; }
  .spacer { flex: 1 1 auto; }

  .apptabs { display: flex; flex-wrap: wrap; gap: 8px; }
  .apptab {
    display: inline-flex; align-items: center; gap: 8px; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface); color: var(--ink-2);
    padding: 7px 14px; border-radius: 999px; font-size: 13.5px; font-weight: 600;
    transition: border-color .15s, color .15s, background .15s;
  }
  .apptab .swatch { width: 9px; height: 9px; border-radius: 50%; background: var(--sw, #999); }
  .apptab[aria-selected="true"] { color: var(--ink); border-color: var(--accent); background: var(--accent-weak); }
  .apptab:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .rangebar { display: flex; align-items: center; gap: 10px; margin: 18px 0 8px; color: var(--muted); font-size: 12.5px; }
  .rangebar .seg { display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .rangebar .seg button {
    border: 0; background: var(--surface); color: var(--ink-2); font: inherit; font-size: 12.5px;
    padding: 5px 11px; cursor: pointer; border-left: 1px solid var(--border);
  }
  .rangebar .seg button:first-child { border-left: 0; }
  .rangebar .seg button[aria-pressed="true"] { background: var(--accent-weak); color: var(--ink); font-weight: 650; }

  .banner {
    display: flex; align-items: center; gap: 10px; margin: 12px 0 20px;
    background: color-mix(in srgb, var(--warn) 14%, var(--surface));
    border: 1px solid color-mix(in srgb, var(--warn) 45%, var(--border));
    border-radius: 12px; padding: 11px 15px; font-size: 13px; color: var(--ink-2);
  }
  .banner b { color: var(--ink); }
  .banner .ic { flex: none; font-weight: 800; color: #9a6a00; }

  /* KPI tiles */
  .kpis { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin: 18px 0 26px; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow); }
  .kpi .k-label { font-size: 12.5px; color: var(--muted); font-weight: 600; }
  .kpi .k-val { font-size: 28px; font-weight: 780; letter-spacing: -0.02em; margin-top: 6px; }
  .kpi .k-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .kpi .k-val .unit { font-size: 15px; font-weight: 600; color: var(--ink-2); margin-left: 2px; }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow); }
  .panel h2 { font-size: 15px; font-weight: 700; margin: 0 0 2px; letter-spacing: -0.01em; }
  .panel .p-sub { color: var(--muted); font-size: 12.5px; margin: 0 0 14px; }
  .panel-head { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }

  /* Funnel */
  .funnel { display: grid; gap: 9px; }
  .fstep { display: grid; grid-template-columns: 92px 1fr auto; align-items: center; gap: 12px; }
  .fstep .fl { font-size: 13px; color: var(--ink-2); font-weight: 600; }
  .ftrack { position: relative; height: 30px; background: var(--surface-2); border-radius: 7px; overflow: hidden; }
  .ffill { position: absolute; inset: 0 auto 0 0; background: var(--accent); border-radius: 7px; display: flex; align-items: center; }
  .ffill .n { color: #fff; font-size: 12.5px; font-weight: 700; padding: 0 10px; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .ftrack .n-out { position: absolute; top: 0; height: 30px; display: flex; align-items: center; font-size: 12.5px; font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .fstep .fr { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; text-align: right; min-width: 78px; }
  .fstep .fr b { color: var(--ink); font-weight: 700; }
  .fdrop { color: #b23; }

  /* Time series */
  .metric-toggle { display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .metric-toggle button { border: 0; border-left: 1px solid var(--border); background: var(--surface); color: var(--ink-2); font: inherit; font-size: 12px; padding: 4px 10px; cursor: pointer; }
  .metric-toggle button:first-child { border-left: 0; }
  .metric-toggle button[aria-pressed="true"] { background: var(--accent-weak); color: var(--ink); font-weight: 650; }
  svg { display: block; width: 100%; height: auto; overflow: visible; }
  .axis-label { fill: var(--muted); font-size: 10.5px; }
  .gridline { stroke: var(--grid); stroke-width: 1; }
  .baseline { stroke: var(--axis); stroke-width: 1; }

  /* Event table */
  .tablewrap { overflow-x: auto; margin-top: 4px; }
  table { border-collapse: collapse; width: 100%; min-width: 460px; }
  th, td { text-align: left; padding: 9px 10px; border-bottom: 1px solid var(--grid); font-size: 13px; }
  th { color: var(--muted); font-weight: 600; font-size: 11.5px; text-transform: uppercase; letter-spacing: .04em; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  tbody tr:hover td { background: var(--surface-2); }
  .minibar { height: 8px; border-radius: 4px; background: var(--accent); display: inline-block; vertical-align: middle; min-width: 2px; }
  .ev-raw { color: var(--muted); font-size: 11px; }

  /* Tooltip */
  #tip {
    position: fixed; pointer-events: none; z-index: 20; opacity: 0; transition: opacity .1s;
    background: var(--ink); color: var(--plane); font-size: 12px; padding: 6px 9px; border-radius: 7px;
    box-shadow: 0 4px 14px rgba(0,0,0,.25); font-variant-numeric: tabular-nums; white-space: nowrap;
  }
  #tip b { color: #fff; }
  :root[data-theme="dark"] #tip, :root:where(:not([data-theme="light"])) #tip { color: #111; }

  footer { margin-top: 30px; color: var(--muted); font-size: 12px; line-height: 1.7; }
  footer code { background: var(--surface-2); padding: 1px 5px; border-radius: 4px; }

  @media (max-width: 860px) {
    .kpis { grid-template-columns: repeat(2, 1fr); }
    .grid2 { grid-template-columns: 1fr; }
  }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div>
      <div class="title">앱 애널리틱스 허브<span class="dot">.</span></div>
      <div class="subtitle" id="sub">앱별 접속자·퍼널·전환 통합 대시보드</div>
    </div>
    <div class="spacer"></div>
    <div class="apptabs" id="apptabs" role="tablist" aria-label="앱 선택"></div>
  </header>

  <div class="rangebar">
    <span id="rangetext">—</span>
    <div class="spacer"></div>
    <div class="seg" id="rangeseg" role="group" aria-label="기간">
      <button data-days="7" aria-pressed="false">7일</button>
      <button data-days="30" aria-pressed="false">30일</button>
      <button data-days="90" aria-pressed="true">90일</button>
    </div>
  </div>

  <div id="banner"></div>

  <div class="kpis" id="kpis"></div>

  <div class="grid2">
    <section class="panel">
      <div class="panel-head">
        <div><h2>전환 퍼널</h2><p class="p-sub" id="funnel-sub">단계별 순 사용자</p></div>
      </div>
      <div class="funnel" id="funnel"></div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div><h2>일별 추이</h2><p class="p-sub">날짜별 지표</p></div>
        <div class="metric-toggle" id="metrictoggle" role="group" aria-label="지표 선택">
          <button data-m="users" aria-pressed="true">활성 사용자</button>
          <button data-m="app_open" aria-pressed="false">앱 실행</button>
        </div>
      </div>
      <div id="tschart"></div>
    </section>
  </div>

  <section class="panel" style="margin-top:16px">
    <div class="panel-head">
      <div><h2>이벤트 상세</h2><p class="p-sub">기간 내 이벤트별 발생 수와 순 사용자</p></div>
    </div>
    <div class="tablewrap">
      <table>
        <thead><tr><th>이벤트</th><th class="num">이벤트 수</th><th class="num">순 사용자</th><th style="width:34%">비중</th></tr></thead>
        <tbody id="evbody"></tbody>
      </table>
    </div>
  </section>

  <footer id="foot"></footer>
</div>

<div id="tip" role="status" aria-live="polite"></div>

<script src="apps.config.js"></script>
<script>
(function () {
  "use strict";
  const APPS = (window.ANALYTICS_APPS || []);
  const tip = document.getElementById('tip');
  const fmt = (n) => (n == null ? '—' : n.toLocaleString('ko-KR'));
  const pct = (n, d) => (d ? Math.round((n / d) * 1000) / 10 : 0);

  const state = { app: null, data: null, days: 90, metric: 'users' };

  function accentFor(app) {
    const dark = matchMedia('(prefers-color-scheme: dark)').matches &&
                 document.documentElement.getAttribute('data-theme') !== 'light' ||
                 document.documentElement.getAttribute('data-theme') === 'dark';
    return dark && app.accentDark ? app.accentDark : app.accent;
  }
  function setAccent(app) {
    document.documentElement.style.setProperty('--accent', accentFor(app));
  }

  function showTip(html, x, y) {
    tip.innerHTML = html;
    tip.style.opacity = '1';
    const pad = 12;
    let left = x + pad, top = y + pad;
    const r = tip.getBoundingClientRect();
    if (left + r.width > innerWidth - 8) left = x - r.width - pad;
    if (top + r.height > innerHeight - 8) top = y - r.height - pad;
    tip.style.left = left + 'px'; tip.style.top = top + 'px';
  }
  const hideTip = () => { tip.style.opacity = '0'; };

  // ---------- data helpers ----------
  const evMap = () => Object.fromEntries((state.data.events || []).map(e => [e.event, e]));
  const usersOf = (ev) => (evMap()[ev] ? evMap()[ev].users : 0);
  const sliceTs = () => {
    const ts = state.data.timeseries || [];
    return state.days >= ts.length ? ts : ts.slice(ts.length - state.days);
  };

  // ---------- render: app tabs ----------
  function renderTabs() {
    const el = document.getElementById('apptabs');
    el.innerHTML = '';
    APPS.forEach((app, i) => {
      const b = document.createElement('button');
      b.className = 'apptab';
      b.setAttribute('role', 'tab');
      b.setAttribute('aria-selected', String(app.id === state.app.id));
      b.style.setProperty('--sw', app.accent);
      b.innerHTML = `<span class="swatch"></span>${app.name}`;
      b.onclick = () => selectApp(app.id);
      el.appendChild(b);
    });
  }

  // ---------- render: KPIs ----------
  function renderKpis() {
    const d = state.data, app = state.app;
    const openUsers = usersOf('app_open') || d.totals.users || 0;
    const cards = [
      { label: '순 사용자', val: fmt(d.totals.users), sub: `기간 ${d.range ? d.range.days : state.days}일` },
      { label: '앱 실행 (이벤트)', val: fmt((evMap()['app_open'] || {}).count || 0), sub: `순 사용자 ${fmt(openUsers)}명` },
    ];
    (app.conversions || []).forEach(c => {
      const num = usersOf(c.num), den = usersOf(c.den) || openUsers;
      cards.push({ label: c.label, val: pct(num, den), unit: '%', sub: `${fmt(num)} / ${fmt(den)}` });
    });
    const el = document.getElementById('kpis');
    el.innerHTML = cards.map(c => `
      <div class="kpi">
        <div class="k-label">${c.label}</div>
        <div class="k-val">${c.val}${c.unit ? `<span class="unit">${c.unit}</span>` : ''}</div>
        <div class="k-sub">${c.sub}</div>
      </div>`).join('');
  }

  // ---------- render: funnel ----------
  function renderFunnel() {
    const app = state.app;
    const steps = (app.funnel || []).map(f => ({ ...f, users: usersOf(f.event) }));
    const top = steps.length ? steps[0].users || 1 : 1;
    const el = document.getElementById('funnel');
    el.innerHTML = steps.map((s, i) => {
      const wpct = Math.max(1.5, pct(s.users, top));
      const inside = wpct >= 16;   // 막대가 좁으면 숫자를 막대 밖에
      const num = fmt(s.users);
      const bar = `<div class="ffill" style="width:${wpct}%">${inside ? `<span class="n">${num}</span>` : ''}</div>`;
      const out = inside ? '' : `<span class="n-out" style="left:calc(${wpct}% + 6px)">${num}</span>`;
      const fromPrev = i === 0 ? 100 : pct(s.users, steps[i - 1].users);
      const drop = i === 0 ? '' : `<span class="fdrop">▼ ${(100 - fromPrev).toFixed(1)}%</span>`;
      return `
        <div class="fstep">
          <div class="fl">${s.label}</div>
          <div class="ftrack">${bar}${out}</div>
          <div class="fr"><b>${pct(s.users, top)}%</b> ${drop}</div>
        </div>`;
    }).join('');
    document.getElementById('funnel-sub').textContent =
      `${steps[0] ? steps[0].label : ''} 대비 · 총 ${pct(steps[steps.length-1]?.users||0, top)}% 도달`;
  }

  // ---------- render: time series (area) ----------
  function renderTs() {
    const ts = sliceTs();
    const m = state.metric;
    const W = 560, H = 220, P = { t: 14, r: 14, b: 24, l: 40 };
    const iw = W - P.l - P.r, ih = H - P.t - P.b;
    const vals = ts.map(r => r[m] || 0);
    const max = Math.max(1, ...vals);
    const nice = niceMax(max);
    const X = (i) => P.l + (ts.length <= 1 ? iw / 2 : (i / (ts.length - 1)) * iw);
    const Y = (v) => P.t + ih - (v / nice) * ih;

    const line = ts.map((r, i) => `${i ? 'L' : 'M'}${X(i).toFixed(1)},${Y(r[m] || 0).toFixed(1)}`).join(' ');
    const area = `${line} L${X(ts.length - 1).toFixed(1)},${(P.t + ih).toFixed(1)} L${X(0).toFixed(1)},${(P.t + ih).toFixed(1)} Z`;

    const ticks = 4, gl = [];
    for (let i = 0; i <= ticks; i++) {
      const v = (nice / ticks) * i, y = Y(v);
      gl.push(`<line class="gridline" x1="${P.l}" y1="${y.toFixed(1)}" x2="${W - P.r}" y2="${y.toFixed(1)}"/>`);
      gl.push(`<text class="axis-label" x="${P.l - 6}" y="${(y + 3.5).toFixed(1)}" text-anchor="end">${fmt(Math.round(v))}</text>`);
    }
    // x labels: first / mid / last
    const xlab = [0, Math.floor(ts.length / 2), ts.length - 1].filter((v, i, a) => a.indexOf(v) === i);
    const xl = xlab.map(i => `<text class="axis-label" x="${X(i).toFixed(1)}" y="${H - 6}" text-anchor="middle">${ts[i] ? ts[i].date.slice(5) : ''}</text>`).join('');

    const endX = X(ts.length - 1), endY = Y(ts[ts.length - 1] ? ts[ts.length - 1][m] : 0);

    const svg = `
      <svg viewBox="0 0 ${W} ${H}" role="img" aria-label="일별 ${m === 'users' ? '활성 사용자' : '앱 실행'} 추이">
        <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="var(--accent)" stop-opacity="0.28"/>
          <stop offset="1" stop-color="var(--accent)" stop-opacity="0.02"/>
        </linearGradient></defs>
        ${gl.join('')}
        <path d="${area}" fill="url(#ag)"/>
        <path d="${line}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
        <circle cx="${endX.toFixed(1)}" cy="${endY.toFixed(1)}" r="3.5" fill="var(--accent)" stroke="var(--surface)" stroke-width="2"/>
        <line class="baseline" x1="${P.l}" y1="${P.t + ih}" x2="${W - P.r}" y2="${P.t + ih}"/>
        ${xl}
        <rect id="ts-hit" x="${P.l}" y="${P.t}" width="${iw}" height="${ih}" fill="transparent"/>
        <line id="ts-cross" x1="0" y1="${P.t}" x2="0" y2="${P.t + ih}" stroke="var(--accent)" stroke-width="1" opacity="0"/>
        <circle id="ts-focus" r="4" fill="var(--accent)" stroke="var(--surface)" stroke-width="2" opacity="0"/>
      </svg>`;
    const host = document.getElementById('tschart');
    host.innerHTML = svg;

    const sv = host.querySelector('svg');
    const hit = host.querySelector('#ts-hit');
    const cross = host.querySelector('#ts-cross');
    const focus = host.querySelector('#ts-focus');
    const label = m === 'users' ? '활성 사용자' : '앱 실행';
    hit.addEventListener('pointermove', (e) => {
      const pt = svgX(sv, e.clientX);
      let i = Math.round(((pt - P.l) / iw) * (ts.length - 1));
      i = Math.max(0, Math.min(ts.length - 1, i));
      const x = X(i), y = Y(ts[i][m] || 0);
      cross.setAttribute('x1', x); cross.setAttribute('x2', x); cross.setAttribute('opacity', '0.5');
      focus.setAttribute('cx', x); focus.setAttribute('cy', y); focus.setAttribute('opacity', '1');
      showTip(`<b>${ts[i].date}</b><br>${label} ${fmt(ts[i][m] || 0)}`, e.clientX, e.clientY);
    });
    hit.addEventListener('pointerleave', () => { cross.setAttribute('opacity', '0'); focus.setAttribute('opacity', '0'); hideTip(); });
  }

  function niceMax(v) {
    const p = Math.pow(10, Math.floor(Math.log10(v)));
    const n = v / p;
    const step = n <= 1 ? 1 : n <= 2 ? 2 : n <= 5 ? 5 : 10;
    return step * p;
  }
  function svgX(svg, clientX) {
    const pt = svg.createSVGPoint(); pt.x = clientX; pt.y = 0;
    const inv = svg.getScreenCTM().inverse();
    return pt.matrixTransform(inv).x;
  }

  // ---------- render: event table ----------
  function renderTable() {
    const app = state.app;
    const rows = (state.data.events || []).slice().sort((a, b) => b.count - a.count);
    const max = Math.max(1, ...rows.map(r => r.count));
    const body = document.getElementById('evbody');
    body.innerHTML = rows.map(r => {
      const label = (app.labels && app.labels[r.event]) || r.event;
      const raw = label !== r.event ? `<span class="ev-raw"> · ${r.event}</span>` : '';
      const w = Math.max(2, (r.count / max) * 100);
      return `<tr>
        <td>${label}${raw}</td>
        <td class="num">${fmt(r.count)}</td>
        <td class="num">${fmt(r.users)}</td>
        <td><span class="minibar" style="width:${w}%"></span></td>
      </tr>`;
    }).join('');
  }

  // ---------- banner + footer ----------
  function renderChrome() {
    const d = state.data, app = state.app;
    const banner = document.getElementById('banner');
    if (d.sample) {
      banner.innerHTML = `<div class="banner"><span class="ic">●</span>
        <span><b>샘플 데이터입니다.</b> 실제 접속자 수치가 아닙니다 —
        <code>scripts/fetch-posthog.mjs</code> 로 PostHog에서 실데이터를 생성해 <code>data/${app.id}.json</code> 을 교체하면 이 배너가 사라집니다.</span></div>`;
    } else {
      banner.innerHTML = `<div class="banner" style="background:color-mix(in srgb, var(--good) 12%, var(--surface));border-color:color-mix(in srgb,var(--good) 40%,var(--border))">
        <span class="ic" style="color:var(--good)">●</span>
        <span>실데이터 · <b>${app.name}</b> · 생성 ${d.generatedAt ? d.generatedAt.slice(0,10) : '—'}</span></div>`;
    }
    document.getElementById('rangetext').textContent =
      d.range ? `${d.range.from} ~ ${d.range.to}` : `최근 ${state.days}일`;
    document.getElementById('sub').textContent = `${app.name} · ${app.subtitle || ''}`;
    document.getElementById('foot').innerHTML =
      `데이터 소스: PostHog ${app.posthog ? `(project ${app.posthog.projectId})` : ''} · 앱 추가는 <code>apps.config.js</code> + <code>data/&lt;id&gt;.json</code> · 갱신은 <code>scripts/fetch-posthog.mjs</code>`;
  }

  function renderAll() {
    setAccent(state.app);
    renderTabs(); renderChrome(); renderKpis(); renderFunnel(); renderTs(); renderTable();
  }

  // ---------- load ----------
  async function selectApp(id) {
    const app = APPS.find(a => a.id === id) || APPS[0];
    state.app = app;
    state.days = 90;
    document.querySelectorAll('#rangeseg button').forEach(b => b.setAttribute('aria-pressed', String(+b.dataset.days === 90)));
    try {
      const res = await fetch(app.dataUrl, { cache: 'no-store' });
      if (!res.ok) throw new Error(res.status);
      state.data = await res.json();
    } catch (e) {
      document.getElementById('banner').innerHTML =
        `<div class="banner"><span class="ic">!</span><span><b>${app.dataUrl}</b> 를 불러오지 못했습니다 (${e.message}). 로컬에서 열 땐 <code>file://</code> 대신 간단한 서버로 여세요 — 예: <code>python3 -m http.server</code>. GitHub Pages에선 정상 동작합니다.</span></div>`;
      ['kpis','funnel','tschart','evbody'].forEach(i => { const el = document.getElementById(i); if (el) el.innerHTML=''; });
      renderTabs();
      return;
    }
    // 데이터의 실제 보유 일수로 range 버튼 상한 보정
    renderAll();
  }

  // controls
  document.getElementById('rangeseg').addEventListener('click', (e) => {
    const b = e.target.closest('button'); if (!b) return;
    state.days = +b.dataset.days;
    document.querySelectorAll('#rangeseg button').forEach(x => x.setAttribute('aria-pressed', String(x === b)));
    renderKpis(); renderTs();
    document.getElementById('rangetext').textContent = state.data.range
      ? (state.days >= (state.data.timeseries||[]).length ? `${state.data.range.from} ~ ${state.data.range.to}` : `최근 ${state.days}일`)
      : `최근 ${state.days}일`;
  });
  document.getElementById('metrictoggle').addEventListener('click', (e) => {
    const b = e.target.closest('button'); if (!b) return;
    state.metric = b.dataset.m;
    document.querySelectorAll('#metrictoggle button').forEach(x => x.setAttribute('aria-pressed', String(x === b)));
    renderTs();
  });
  matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => { if (state.app) { setAccent(state.app); renderTs(); } });

  // boot
  if (!APPS.length) {
    document.getElementById('banner').innerHTML = `<div class="banner"><span class="ic">!</span><span>등록된 앱이 없습니다. <code>apps.config.js</code> 에 앱을 추가하세요.</span></div>`;
  } else {
    selectApp(APPS[0].id);
  }
})();
</script>
</body>
</html>
